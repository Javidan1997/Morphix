<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 104" width="560" height="104">
  <defs>
    <linearGradient id="tileGrad" x1="12%" y1="10%" x2="88%" y2="90%">
      <stop offset="0%" stop-color="#132844"/>
      <stop offset="52%" stop-color="#123A67"/>
      <stop offset="100%" stop-color="#11589A"/>
    </linearGradient>
    <linearGradient id="markTop" x1="18%" y1="18%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#E8FDFF"/>
      <stop offset="100%" stop-color="#7EDBFF"/>
    </linearGradient>
    <linearGradient id="markSide" x1="12%" y1="12%" x2="88%" y2="100%">
      <stop offset="0%" stop-color="#69EDFF"/>
      <stop offset="100%" stop-color="#2493F2"/>
    </linearGradient>
    <linearGradient id="markBottom" x1="0%" y1="20%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76F3D7"/>
      <stop offset="100%" stop-color="#33A6FF"/>
    </linearGradient>
    <filter id="markShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#06101F" flood-opacity="0.2"/>
    </filter>
    <filter id="wordShadow" x="-10%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#markShadow)">
    <rect x="8" y="8" width="80" height="80" rx="24" fill="url(#tileGrad)"/>
    <rect x="8.5" y="8.5" width="79" height="79" rx="23.5" fill="none" stroke="rgba(255,255,255,0.14)"/>

    <polygon points="30,26 57,26 69,32 56,39 29,39 18,33" fill="url(#markTop)"/>
    <polygon points="18,33 29,39 29,57 18,63 12,59 12,38" fill="url(#markSide)"/>
    <polygon points="29,57 56,57 69,63 57,70 30,70 18,63" fill="url(#markBottom)"/>
    <polygon points="55,41 69,48 55,55 41,48" fill="#FFFFFF"/>

    <line x1="18" y1="33" x2="29" y2="39" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <line x1="18" y1="63" x2="29" y2="57" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    <line x1="29" y1="39" x2="29" y2="57" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  </g>

  <text
    x="118"
    y="66"
    font-family="'Sora', 'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="39"
    font-weight="900"
    letter-spacing="4"
    fill="#0F1C31"
    stroke="#F5FBFF"
    stroke-opacity="0.84"
    stroke-width="0.95"
    paint-order="stroke fill"
    filter="url(#wordShadow)"
  >CONFIGURO</text>
</svg>
