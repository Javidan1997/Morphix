<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B06AFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Isometric Cube Mark -->
  <!-- Top face: violet (light source from top-left) -->
  <polygon points="50,10 90,30 50,50 10,30" fill="url(#topFace)"/>
  <!-- Left face: deep dark violet (shadow) -->
  <polygon points="10,30 50,50 50,90 10,70" fill="#1A0870"/>
  <!-- Right face: kinetic magenta (accent) -->
  <polygon points="90,30 90,70 50,90 50,50" fill="#D91F8C"/>

  <!-- Inner edge definition lines -->
  <line x1="50" y1="10" x2="50" y2="50" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="10" y1="30" x2="50" y2="50" stroke="rgba(255,255,255,0.14)" stroke-width="0.8"/>
  <line x1="90" y1="30" x2="50" y2="50" stroke="rgba(255,255,255,0.14)" stroke-width="0.8"/>
  <line x1="50" y1="50" x2="50" y2="90" stroke="rgba(0,0,0,0.25)" stroke-width="0.8"/>
  <line x1="50" y1="50" x2="10" y2="70" stroke="rgba(0,0,0,0.18)" stroke-width="0.7"/>
  <line x1="50" y1="50" x2="90" y2="70" stroke="rgba(0,0,0,0.18)" stroke-width="0.7"/>
</svg>
